name: Ubuntu 24.04 (GCC 13)

on: [push]

jobs:
    ci:
        runs-on: ubuntu-24.04
        steps:
        - uses: actions/checkout@v4
          with:
            submodules: recursive
        - name: prepare
          run: |
            sudo apt-get update
            sudo apt-get install libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libgtk-3-dev libhdf5-dev pkgconf
        - name: cmake
          run: |
            cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DVIAMD_ENABLE_TREXIO=OFF
        - name: build
          run: |
            cmake --build build -j 4
