name: MacOS (Clang)

on: [push]

jobs:
    ci:
        runs-on: macos-latest
        steps:
        - uses: actions/checkout@v2
        - name: prepare
          run: |
            git submodule update --init --recursive
        - name: cmake
          run: |
            cmake -S . -B build
        - name: build
          run: |
            cmake --build build --parallel 4
