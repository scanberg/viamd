name: Windows (MSVC)

on: [push]

jobs:
    ci:
        runs-on: windows-2022
        steps:
        - uses: actions/checkout@v2
        - name: prepare
          run: |
            git submodule update --init --recursive
        - name: cmake
          run: |
            cmake -S . -B build
        - name: build
          run: |
            cmake --build build --config Release -- /nologo /verbosity:minimal /maxcpucount:4
